name: release

# Push a version tag (e.g. `git tag v0.0.3 && git push --tags`) to build every
# platform and publish a GitHub Release with the binaries + SHA256SUMS.txt.
# Or run it manually from the Actions tab (workflow_dispatch) with a tag name.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.0.3) — created if it does not exist'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet & test
        run: |
          go vet ./...
          go test ./...

      - name: Cross-compile all platforms
        run: bash scripts/release.sh --archive

      - name: List artifacts
        run: ls -la dist/release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: better-speedtest ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/release/*
